[params.ui.taxonomyLabels]
categories = "Categories"
tags = "Tags"
authors = "Authors"

[params.archive]
sections = ["posts"]
groupBy = "2006"
showYearCount = true

[params.related]
count = 3
sameSectionOnly = true
summaryLength = 145
showSummary = true

[params.share]
networks = [
    "x",
    "facebook",
    "linkedin",
    "reddit",
    "whatsapp",
    "telegram",
    "pinterest",
    "bluesky",
]

[params.comments]
enabled = false
provider = "giscus" # "giscus" or "disqus"

[params.comments.giscus]
repo = ""
repoId = ""
category = ""
categoryId = ""
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
emitMetadata = "0"
inputPosition = "bottom"
theme = "preferred_color_scheme"
lang = "en"
loading = "lazy"

[params.comments.disqus]
shortname = ""

[params.design]
fontDisplay = '"Cormorant Garamond", Garamond, "Times New Roman", serif'
fontBody = '"Libre Baskerville", Baskerville, Georgia, serif'
fontUi = '"DM Sans", "Segoe UI", sans-serif'
radiusSm = "0.35rem"
radiusMd = "0.7rem"
containerMax = "1120px"
contentMax = "1000px"
bodyOverlayOpacity = "0.35"
bodyOverlayLinear = 'linear-gradient(130deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0) 48%)'
bodyOverlayRadial = 'radial-gradient(circle at 0% 0%, rgba(123, 45, 38, 0.1), transparent 42%)'
colorAdmonitionNote = "#4f7ca8"
colorAdmonitionTip = "#3f8a5f"
colorAdmonitionInfo = "#2f7d99"
colorAdmonitionWarning = "#b77b2e"
colorAdmonitionDanger = "#a23b3b"

[params.design.light]
colorBg = "#f2ece1"
colorSurface = "#fbf7f0"
colorSurfaceStrong = "#f4ede1"
colorText = "#1e1a16"
colorMuted = "#6b6158"
colorAccent = "#7b2d26"
colorAccentSoft = "#bc9a62"
colorBorder = "#d7ccbb"
shadowSoft = "0 14px 30px rgba(37, 26, 14, 0.08)"

[params.design.dark]
colorBg = "#151513"
colorSurface = "#1d1d1a"
colorSurfaceStrong = "#262622"
colorText = "#f3ede3"
colorMuted = "#c2b7a8"
colorAccent = "#d8926a"
colorAccentSoft = "#e7bf78"
colorBorder = "#3c3a34"
shadowSoft = "0 14px 28px rgba(0, 0, 0, 0.35)"

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [["$$", "$$"], ["\\[", "\\]"]]
inline = [["$", "$"], ["\\(", "\\)"]]

