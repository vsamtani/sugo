backToTopIcon = "↑"
backToTopShowOffset = 520
fontPreconnectPrimary = "https://fonts.googleapis.com"
fontPreconnectSecondary = "https://fonts.gstatic.com"
fontStylesheetHref = "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Libre+Baskerville:wght@400;700&display=swap"
mathJaxScript = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
homeEditorHeading = "From the Theme Creator"
homeFeaturedEyebrow = "Featured Story"
homeFeaturedCta = "Read featured story"
homeLatestEyebrow = "Latest Writing"
homeLatestHeading = "Recent Articles"
sectionEyebrow = "Collection"
taxonomyEyebrow = "Browse"
articleCardCta = "Read more..."
paginationAriaLabel = "Pagination"
paginationPrevLabel = "Previous"
paginationNextLabel = "Next"
tocHeading = "Table of Contents"
tocStartLevel = 2
tocEndLevel = 4
tocOrdered = false
articleFallbackType = "Article"
articleByLabel = "By"
articlePublishedLabel = "Published"
articleUpdatedLabel = "Updated"
articleReadingTimeLabel = "Reading time"
articleMinReadLabel = "min read"
articlePostNavAriaLabel = "Post navigation"
articlePrevLabel = "Previous"
articleNextLabel = "Next"
articleShareHeading = "Share this article"
articleShareAriaLabel = "Share this article"
articleCommentsHeading = "Comments"
articleCommentsAriaLabel = "Comments"
articleCommentsEnableJsLabel = "Please enable JavaScript to view the comments."
footerTagline = "Basic documentation for Sugo theme for Hugo."
