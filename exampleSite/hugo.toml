baseURL = 'https://example.org/'
languageCode = 'en-US'
title = "SUGO"
readingSpeed = 212
disablePathToLower=true
theme="sugo"

[taxonomies]
tag = "tags"
category = "categories"
author = "authors"

[menus]
[[menus.main]]
name = 'Home'
pageRef = '/'
weight = 10

[[menus.main]]
name = 'Posts'
pageRef = '/posts'
weight = 20

[[menus.main]]
name= 'Docs'
pageRef = '/docs'
weight = 30


[[menus.main]]
name = 'About'
pageRef = '/pages/about'
identifier = 'about'
weight = 60


[permalinks]
posts = "/:year/:month/:slug/"
substack = "/:year/:month/:slug/"

[module]
[module.hugoVersion]
extended = true
min = '0.146.0'

[markup.goldmark.renderer]
unsafe = true

[related]
includeNewer = true
threshold = 80
toLower = true

[[related.indices]]
name = "tags"
weight = 100

[[related.indices]]
name = "categories"
weight = 70

[[related.indices]]
name = "date"
weight = 10
pattern = "2006"

[params]
paginationSize = 6
summaryLength = 180

[params.features]
enableSearch = true
enableBackToTop = true
enablePagination = true
enableThemeToggle = true
enableMath = true
enableBreadcrumbs = true
enableRelatedPosts = true
fixedThemeWhenToggleOff = "light"

[params.ui]
titleSeparator = " | "
skipLinkText = "Skip to main content"
primaryNavAriaLabel = "Primary"
brandKicker = "Documentation Site"
navToggleText = "Menu"
navToggleAriaLabel = "Toggle navigation"
themeStorageKey = "mytheme-color-scheme"
themeDefault = "light"
themeToggleLabelDarkMode = "Dark"
themeToggleLabelLightMode = "Light"
themeToggleAriaToDark = "Switch to dark mode"
themeToggleAriaToLight = "Switch to light mode"
searchToggleText = "Search"
searchToggleAriaLabel = "Open search"
searchDialogTitle = "Search"
searchCloseLabel = "Close search"
searchPlaceholder = "Search posts"
searchNoResultsText = "No results found"
searchEmptyPrompt = "Search by title, subtitle, tags, categories, authors, or body text."
searchLoadFailedText = "Search index is not available. Build with Pagefind first."
searchLoadingText = "Loading search..."
searchResultLabel = "result"
searchResultsLabel = "results"
breadcrumbAriaLabel = "Breadcrumb"
breadcrumbHomeLabel = "Home"
breadcrumbSeparator = "/"
breadcrumbCurrentFallback = "Current page"
archiveEyebrow = "Archive"
archiveHeading = "All writing"
